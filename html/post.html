<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Post</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="post-page">
    <!-- 
        ====================================================
        MEMBER 2: Implement Single Post View in feed.js
        - Show single post with full details
        - Display comments
        ====================================================
    -->

    <nav class="navbar">
        <div class="nav-container">
            <a href="feed.html" class="logo">nexus</a>
            <div class="nav-links">
                <!-- Will be populated by auth.js -->
            </div>
        </div>
    </nav>

    <div class="post-container">
        <!-- Post -->
        <div id="singlePostContainer">
            <div class="loading-spinner">
                <div class="spinner"></div>
            </div>
        </div>

        <!-- No Post Message -->
        <div id="noPostMessage" style="display:none; text-align:center;">
            <h3>No posts yet.</h3>
        </div>

        <!-- Comments -->
        <div id="commentsSection" style="display:none;">
            <h3>Comments</h3>

            <input type="text" id="commentInput" placeholder="Add a comment...">
            <button id="submitComment">Comment</button>

            <div id="commentsList"></div>
        </div>
    </div>

    <!-- Core scripts (Member 1) -->
    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>

    <!-- Member 2: All post functionality (feed AND single post) -->
    <script src="../js/feed.js"></script>

    <!-- Member 3: Comments and interactions -->
    <script src="../js/interactions.js"></script>
</body>

</html>
