<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Post</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body class="feed-page">
    <!-- 
        ====================================================
        MEMBER 2: Implement Single Post View in feed.js
        - Show single post with full details
        - Display comments
        ====================================================
    -->

    <!-- Navigation -->
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <a href="feed.html" class="logo">nexus</a>
            </div>
            <div class="nav-right">
                <div class="nav-links">
                    <a href="feed.html">Home</a>
                    <a href="profile.html">Profile</a>
                    <a href="#" id="logoutBtn">Logout</a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Feed Container -->
    <div class="feed-container">

        <!-- CREATE POST -->
        <form id="createPostForm">
            <textarea id="postContent" placeholder="What's on your mind?" required></textarea>

            <div class="post-actions-row">
                <button type="submit">Post</button>
            </div>

            <div class="feed-divider"></div> <!-- ✅ MOVED INSIDE -->
        </form>

        <!-- POSTS -->
        <div id="postsContainer"></div>

    </div>

    <!-- Core scripts (Member 1) -->
    <script src="../js/storage.js"></script>
    <script src="../js/auth.js"></script>

    <!-- Member 3: Comments and interactions -->
    <script src="../js/interactions.js"></script>

    <!-- Member 2: All post functionality (feed AND single post) -->
    <script src="../js/feed.js"></script>

</body>

</html>
