<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus - Profile</title>
    <link rel="stylesheet" href="../css/style.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="nav-container">
        <a href="feed.html" class="logo">nexus</a>

        <div class="nav-links">
            <a href="feed.html" class="back-btn">← Back to Feed</a>
        </div>
    </div>
</nav>

<!-- PROFILE -->
<div class="profile-container">

    <div class="profile-header">

        <!-- COVER -->
        <div class="profile-cover"></div>

        <!-- INFO -->
        <div class="profile-info">

            <!-- TOP ROW (avatar + text) -->
            <div class="profile-top">

                <div class="profile-avatar-large" id="profileAvatar"></div>

                <div class="profile-details">
                    <h1 id="profileUsername">Loading...</h1>

                    <p id="profileBio" class="profile-bio">
                        This user hasn't added a bio yet.
                    </p>

                    <div class="profile-stats">
                        <div class="stat-item">
                            <span class="stat-value" id="profilePostsCount">0</span>
                            <span class="stat-label">Posts</span>
                        </div>

                        <div class="stat-item">
                            <span class="stat-value" id="profileFollowersCount">0</span>
                            <span class="stat-label">Followers</span>
                        </div>

                        <div class="stat-item">
                            <span class="stat-value" id="profileFollowingCount">0</span>
                            <span class="stat-label">Following</span>
                        </div>
                    </div>

                    <!-- BUTTONS -->
                    <div class="profile-actions">
                        <button id="editProfileBtn" class="btn btn-secondary">Edit profile</button>
                        <button id="followBtn" class="btn btn-primary">Follow</button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- POSTS -->
    <div class="profile-posts">
        <h2>Posts</h2>

        <div id="userPostsContainer" class="posts-container">
            <div class="loading-spinner">
                <div class="spinner"></div>
            </div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div id="editProfileModal" class="modal-overlay" style="display: none;">
  <div class="modal">
    <h2>Edit profile</h2>

    <form id="editProfileForm">
      <label>Username</label>
      <input type="text" id="editUsername" />

      <label>Bio</label>
      <textarea id="editBio"></textarea>

  <label>Upload Profile Picture</label>
<input type="file" id="uploadProfilePic" accept="image/*" />

      <div class="modal-actions">
        <button type="submit" id="saveProfileBtn" class="btn primary">Save</button>
        <button type="button" id="closeProfileBtn" class="btn">Cancel</button>
      </div>
    </form>
  </div>
</div>

<!-- SCRIPTS -->
<script src="../js/storage.js"></script>
<script src="../js/auth.js"></script>
<script src="../js/feed.js"></script>
<script src="../js/interactions.js"></script>
<script src="../js/profile.js"></script>

</body>
</html>
